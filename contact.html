<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Portfolio</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
</head>

<body class="bg-slate-950 text-white font-sans relative overflow-x-hidden">

<!-- BACKGROUND -->
<div id="terminal-bg"></div>

<div class="min-h-screen flex flex-col items-center justify-center px-4 relative z-10">

  <!-- TITLE -->
  <div class="text-center mb-10">
    <h1 class="text-3xl md:text-4xl font-bold text-green-400 font-mono">$ contact_links</h1>
    <p class="text-slate-400 mt-2">Klik untuk menghubungi saya</p>
  </div>

  <!-- SOCIAL LINKS -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-6">

    <!-- GITHUB -->
    <a href="https://github.com/dimasaldi2005" target="_blank"

  <!-- FIX 100% -->

       fill="currentColor"

    C23.5 5.65 18.35.5 12 .5z"/>

  <span>GitHub</span>
</a>

    <!-- LINKEDIN -->
    <a href="https://linkedin.com/in/username" target="_blank"
      class="contact-card group">
      <i class="devicon-linkedin-plain colored text-3xl"></i>
      <span>LinkedIn</span>
    </a>

    <!-- INSTAGRAM -->
    <a href="https://instagram.com/username" target="_blank"
      class="contact-card group">
      <svg class="w-8 h-8 text-pink-500" fill="currentColor" viewBox="0 0 24 24">
        <path d="M7.75 2C4.678 2 2 4.678 2 7.75v8.5C2 19.322 4.678 22 7.75 22h8.5C19.322 22 22 19.322 22 16.25v-8.5C22 4.678 19.322 2 16.25 2h-8.5zm0 2h8.5C18.216 4 20 5.784 20 7.75v8.5c0 1.966-1.784 3.75-3.75 3.75h-8.5C5.784 20 4 18.216 4 16.25v-8.5C4 5.784 5.784 4 7.75 4zm8.25 1.5a1.25 1.25 0 110 2.5 1.25 1.25 0 010-2.5zM12 7a5 5 0 100 10 5 5 0 000-10zm0 2a3 3 0 110 6 3 3 0 010-6z"/>
      </svg>
      <span>Instagram</span>
    </a>

    <!-- WHATSAPP -->
    <a href="https://wa.me/6282142064308" target="_blank"
      class="contact-card group">
      <i data-lucide="phone" class="w-8 h-8"></i>
      <span>WhatsApp</span>
    </a>

  </div>

</div>

<!-- DOCK -->
<div class="fixed bottom-6 left-1/2 -translate-x-1/2 flex gap-4 px-6 py-3 rounded-2xl bg-white/10 backdrop-blur-xl shadow-lg z-40">

  <div onclick="navigateTo('index.html')" class="dock-item group relative cursor-pointer">
    <i data-lucide="home" class="text-blue-400"></i>
    <span class="tooltip-hover">Home</span>
  </div>

  <div onclick="navigateTo('about.html')" class="dock-item group relative cursor-pointer">
    <i data-lucide="user" class="text-green-400"></i>
    <span class="tooltip-hover">Profil</span>
  </div>

  <div onclick="navigateTo('project.html')" class="dock-item group relative cursor-pointer">
    <i data-lucide="code" class="text-yellow-400"></i>
    <span class="tooltip-hover">Project</span>
  </div>

  <div onclick="navigateTo('sertifikat.html')" class="dock-item group relative cursor-pointer">
    <i data-lucide="award" class="text-red-400"></i>
    <span class="tooltip-hover">Sertifikat</span>
  </div>

</div>

<!-- SCRIPT (CUMA SATU!) -->
<script>
window.onload = () => {
  lucide.createIcons();
};

function navigateTo(page) {
  window.location.href = page;
}
</script>

<script src="script.js"></script>

</body>
</html>

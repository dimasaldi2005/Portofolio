<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sertifikat - Portfolio</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      background: #020617;
      color: white;
      font-family: monospace;
    }

    /* CARD */
    .cert-card {
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: 16px;
      padding: 12px;
      transition: 0.3s;
      cursor: pointer;
    }

    .cert-card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 0 20px rgba(34,197,94,0.5);
      border-color: #22c55e;
    }

    .cert-img {
      border-radius: 12px;
      height: 160px;
      width: 100%;
      object-fit: cover;
    }

    /* MODAL */
    .modal {
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
    }

    /* DOCK */
    .dock-item {
      padding: 12px;
      border-radius: 12px;
      transition: 0.3s;
    }

    .dock-item:hover {
      transform: scale(1.3) translateY(-6px);
      background: rgba(255,255,255,0.2);
      box-shadow: 0 0 15px rgba(34,197,94,0.6);
    }

    /* TOOLTIP */
    .tooltip-hover {
      position: absolute;
      bottom: 120%;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(0,0,0,0.8);
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 12px;
      opacity: 0;
      transition: 0.3s;
      pointer-events: none;
    }

    .group:hover .tooltip-hover {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body class="overflow-x-hidden">

<div class="min-h-screen px-6 py-16">

  <!-- TITLE -->
  <div class="text-center mb-12">
    <h1 class="text-3xl md:text-4xl font-bold text-green-400">$ ./sertifikat.sh$</h1>
    <p class="text-slate-400 mt-2">Daftar sertifikat yang saya miliki</p>
  </div>

  <!-- GRID -->
  <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl mx-auto">

    <!-- ITEM 1 -->
<div class="cert-card" onclick="openModal('Sertifikat Peserta','UI/UX','serti1.png')">
  <img src="serti1.png" class="cert-img">
  <h2 class="mt-3 text-green-400">Peserta Study Club UI/UX</h2>
</div>

<!-- ITEM 2 -->
<div class="cert-card" onclick="openModal('Sertifikat Peserta','Bisnis Digital','serti2.png')">
  <img src="serti2.png" class="cert-img">
  <h2 class="mt-3 text-green-400">Peserta Bisnis Digital</h2>
</div>

<!-- ITEM 3 -->
<div class="cert-card" onclick="openModal('Sertifikat Peserta','SIPORA','serti3.png')">
  <img src="serti3.png" class="cert-img">
  <h2 class="mt-3 text-green-400">Pelatihan Bimbingan</h2>
</div>

  </div>

</div>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 modal flex items-center justify-center z-50">

  <div class="bg-slate-900 p-6 rounded-xl max-w-lg w-full relative">
    <img id="modalImg" class="rounded-xl mb-4 w-full">
    <h2 id="modalTitle" class="text-xl text-green-400"></h2>
    <p id="modalDesc" class="text-slate-300 mt-2"></p>

    <button onclick="closeModal()" class="absolute top-3 right-3 text-xl">✕</button>
  </div>

</div>

<!-- DOCK -->
<div class="fixed bottom-6 left-1/2 -translate-x-1/2 flex gap-4 px-6 py-3 rounded-2xl bg-white/10 backdrop-blur-xl shadow-lg z-40">

  <div onclick="navigateTo('index.html')" class="dock-item group relative cursor-pointer">
    <i data-lucide="home" class="text-blue-400"></i>
    <span class="tooltip-hover">Home</span>
  </div>

  <div onclick="navigateTo('about.html')" class="dock-item group relative cursor-pointer">
    <i data-lucide="user" class="text-green-400"></i>
    <span class="tooltip-hover">Profil</span>
  </div>

  <div onclick="navigateTo('project.html')" class="dock-item group relative cursor-pointer">
    <i data-lucide="code" class="text-yellow-400"></i>
    <span class="tooltip-hover">Project</span>
  </div>
   <div onclick="navigateTo('contact.html')" class="dock-item group relative cursor-pointer">
    <i data-lucide="mail" class="text-red-400"></i>
    <span class="tooltip-hover">Mail</span>
  </div>

</div>

<script>
lucide.createIcons();

/* MODAL */
function openModal(title, desc, img) {
  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("modalTitle").innerText = title;
  document.getElementById("modalDesc").innerText = desc;
  document.getElementById("modalImg").src = img;
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
}

/* NAVIGASI */
function navigateTo(page) {
  window.location.href = page;
}
</script>

<script src="script.js"></script>


</body>
</html>

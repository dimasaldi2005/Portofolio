<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linux Dino Portfolio</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-black text-white overflow-hidden">

<!-- GALAXY -->
<canvas id="galaxy" class="fixed top-0 left-0"></canvas>

<!-- DINO -->
<canvas id="game" class="fixed top-0 left-0"></canvas>

<!-- NOTIF -->
<div id="notif" class="fixed top-5 left-1/2 -translate-x-1/2 px-4 py-2 rounded-lg bg-black/70 text-green-400 font-mono text-sm opacity-0 transition duration-300 z-50"></div>

<!-- CENTER -->
<div class="absolute inset-0 flex flex-col items-center justify-center text-center pointer-events-none z-10">
  <h1 id="clock" class="text-6xl md:text-8xl font-bold opacity-20 font-mono"></h1>
  <p class="text-green-400 mt-4 font-mono tracking-widest">
    Dimas Aldi Saputra@portfolio:~$
  </p>
</div>

<!-- DOCK -->
<div class="fixed bottom-6 left-1/2 -translate-x-1/2 flex gap-4 px-6 py-3 rounded-2xl bg-white/10 backdrop-blur-xl shadow-lg z-10">

  <a href="about.html" class="dock-item">
    <span class="tooltip">Profil</span>
    <i data-lucide="user" class="text-blue-400"></i>
  </a>

  <a href="project.html" class="dock-item">
    <span class="tooltip">Project</span>
    <i data-lucide="code" class="text-green-400"></i>
  </a>

  <a href="sertifikat.html" class="dock-item">
    <span class="tooltip">Sertificate</span>
    <i data-lucide="award" class="text-yellow-400"></i>
  </a>

  <a href="contact.html" class="dock-item">
    <span class="tooltip">Mail</span>
    <i data-lucide="mail" class="text-red-400"></i>
  </a>

</div>

<script>
lucide.createIcons();

/* NOTIF */
function showNotif(text) {
  const notif = document.getElementById("notif");
  notif.innerText = text;
  notif.classList.remove("opacity-0");
  notif.classList.add("opacity-100");

  setTimeout(() => {
    notif.classList.remove("opacity-100");
    notif.classList.add("opacity-0");
  }, 1500);
}

/* JAM */
function updateClock(){
  const now = new Date();
  document.getElementById("clock").innerText =
    now.getHours().toString().padStart(2,'0') + ":" +
    now.getMinutes().toString().padStart(2,'0');
}
setInterval(updateClock,1000);
updateClock();

/* ================= GALAXY ================= */
const galaxy = document.getElementById("galaxy");
const gtx = galaxy.getContext("2d");

function resizeGalaxy() {
  galaxy.width = window.innerWidth;
  galaxy.height = window.innerHeight;
}
resizeGalaxy();
window.addEventListener("resize", resizeGalaxy);

let stars = [];
let mouseX = 0;
let mouseY = 0;

for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random() * galaxy.width,
    y: Math.random() * galaxy.height,
    size: Math.random() * 2,
    speed: Math.random() * 0.3
  });
}

/* PLANET ORBIT */
let planets = [
  {
    cx: 200,
    cy: 150,
    r: 40,
    color: "#60a5fa",
    angle: 0,
    speed: 0.01,
    orbit: 50
  },
  {
    cx: 800,
    cy: 300,
    r: 60,
    color: "#a78bfa",
    angle: 0,
    speed: 0.006,
    orbit: 80
  }
];

window.addEventListener("mousemove", (e) => {
  mouseX = e.clientX / 50;
  mouseY = e.clientY / 50;
});

function drawGalaxy() {
  gtx.clearRect(0, 0, galaxy.width, galaxy.height);

  // ⭐ stars
  gtx.fillStyle = "white";
  stars.forEach(star => {
    star.y += star.speed;

    if (star.y > galaxy.height) {
      star.y = 0;
      star.x = Math.random() * galaxy.width;
    }

    gtx.beginPath();
    gtx.arc(star.x + mouseX, star.y + mouseY, star.size, 0, Math.PI*2);
    gtx.fill();
  });

  // 🪐 planets (BERPUTAR)
  planets.forEach(p => {
    p.angle += p.speed;

    let offsetX = mouseX * 0.5;
    let offsetY = mouseY * 0.5;

    let x = p.cx + Math.cos(p.angle) * p.orbit;
    let y = p.cy + Math.sin(p.angle) * p.orbit;

    let gradient = gtx.createRadialGradient(
      x + offsetX, y + offsetY, 10,
      x + offsetX, y + offsetY, p.r
    );

    gradient.addColorStop(0, p.color);
    gradient.addColorStop(1, "transparent");

    gtx.fillStyle = gradient;

    gtx.beginPath();
    gtx.arc(x + offsetX, y + offsetY, p.r, 0, Math.PI * 2);
    gtx.fill();

    // ring
    gtx.strokeStyle = "rgba(255,255,255,0.3)";
    gtx.beginPath();
    gtx.ellipse(
      x + offsetX,
      y + offsetY,
      p.r + 10,
      p.r / 2,
      p.angle,
      0,
      Math.PI * 2
    );
    gtx.stroke();

    // orbit line
    gtx.strokeStyle = "rgba(255,255,255,0.08)";
    gtx.beginPath();
    gtx.arc(p.cx, p.cy, p.orbit, 0, Math.PI * 2);
    gtx.stroke();
  });

  requestAnimationFrame(drawGalaxy);
}
drawGalaxy();

/* ================= DINO ================= */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let dino = { x: 80, y: canvas.height - 140, vy: 0, jumping: false };
let gravity = 1;
let obstacles = [];

function drawDino() {
  ctx.fillStyle = "#22c55e";

  ctx.fillRect(dino.x, dino.y, 30, 30);
  ctx.fillRect(dino.x + 20, dino.y - 15, 20, 20);
  ctx.fillRect(dino.x + 40, dino.y - 5, 10, 5);

  ctx.fillStyle = "black";
  ctx.fillRect(dino.x + 30, dino.y - 10, 3, 3);

  ctx.fillStyle = "#22c55e";
  ctx.fillRect(dino.x - 10, dino.y + 10, 10, 5);

  let leg = Math.floor(Date.now()/200)%2;
  ctx.fillRect(dino.x + 5, dino.y + 30, 5, 10 + leg*2);
  ctx.fillRect(dino.x + 20, dino.y + 30, 5, 10 + (1-leg)*2);
}

function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "#22c55e";
  ctx.beginPath();
  ctx.moveTo(0, canvas.height - 80);
  ctx.lineTo(canvas.width, canvas.height - 80);
  ctx.stroke();

  dino.y += dino.vy;
  dino.vy += gravity;

  if (dino.y > canvas.height - 120) {
    dino.y = canvas.height - 120;
    dino.jumping = false;
  }

  if (Math.random() < 0.015) {
    obstacles.push({
      x: canvas.width,
      y: canvas.height - 120,
      w: 20,
      h: 40
    });
  }

  obstacles.forEach((obs, i) => {
    obs.x -= 6;
    ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
    if (obs.x < -20) obstacles.splice(i, 1);
  });

  drawDino();
  requestAnimationFrame(update);
}
update();

setInterval(() => {
  if (!dino.jumping) {
    dino.vy = -18;
    dino.jumping = true;
  }
}, 1800);
</script>

<style>
#galaxy { z-index: 0; }
#game { z-index: 1; }

.dock-item {
  position: relative;
  padding: 12px;
  border-radius: 12px;
  transition: 0.3s;
  cursor: pointer;
}

.dock-item:hover {
  transform: scale(1.4) translateY(-8px);
  background: rgba(255,255,255,0.2);
}

.tooltip {
  position: absolute;
  bottom: 120%;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 12px;
  opacity: 0;
  transition: 0.3s;
}

.dock-item:hover .tooltip {
  opacity: 1;
  transform: translateX(-50%) translateY(-5px);
}

canvas {
  filter: drop-shadow(0 0 8px #22c55e);
}

#notif {
  box-shadow: 0 0 10px #22c55e;
}
</style>

</body>
</html>
